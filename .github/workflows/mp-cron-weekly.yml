name: MP cron - weekly

# Cron semanal domingos 08:00 UTC = 05:00 ART. Dispara secuencial:
#   1. backup-tenants  → exporta cada tenant a JSON.gz en bucket
#      tenant-backups (idempotente por path con fecha).
#   2. backup-cleanup  → borra archivos >365 días del bucket.
#
# Política decidida 2026-05-12: backup semanal con retención 1 año
# = 52 snapshots por tenant. backup-tenants se movió desde
# mp-cron-daily.yml. Storage estimado por tenant: ~250-500 MB.

on:
  schedule:
    - cron: '0 8 * * 0'     # domingos 08:00 UTC
  workflow_dispatch:

concurrency:
  group: mp-cron-weekly
  cancel-in-progress: false

jobs:
  weekly:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: backup-tenants (export JSON gzipped)
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.MP_CRON_BEARER }}" \
            'https://pase-yndx.vercel.app/api/backup-tenants'

      - name: backup-cleanup (delete >365d backups)
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.MP_CRON_BEARER }}" \
            'https://pase-yndx.vercel.app/api/backup-cleanup'

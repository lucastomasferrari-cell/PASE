name: IG — refresh tokens

on:
  # Semanal: domingos 03:00 UTC (00:00 Argentina)
  schedule:
    - cron: '0 3 * * 0'
  # Manual desde GitHub UI
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Llamar al endpoint refresh-tokens del bot
        run: |
          curl -fsSL -X POST \
            -H "X-Refresh-Secret: ${{ secrets.IG_REFRESH_SECRET }}" \
            https://pase-instagram-bot.vercel.app/api/refresh-tokens

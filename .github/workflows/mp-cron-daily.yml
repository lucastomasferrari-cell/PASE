name: MP cron - daily

# Cron diario 09:00 UTC = 06:00 ART. Dispara secuencial:
#   1. mp-sync           → recompute saldos legacy + dedup global.
#   2. mp-update-pending-releases → refresca release_status pending de
#      pay-* (GET /v1/payments/{id} directo, evita shard inconsistency
#      de payments/search).
#
# Secuencial (no paralelo) porque tocan la misma tabla mp_movimientos
# y queremos orden determinístico.
#
# backup-tenants se movió a mp-cron-weekly.yml (decisión 2026-05-12:
# backup semanal con retención 1 año = 52 snapshots por tenant).

on:
  schedule:
    - cron: '0 9 * * *'     # 09:00 UTC = 06:00 ART
  workflow_dispatch:

concurrency:
  group: mp-cron-daily
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: mp-sync (saldos legacy + dedup)
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.MP_CRON_BEARER }}" \
            'https://pase-yndx.vercel.app/api/mp-sync'

      - name: mp-update-pending-releases (refresh release fields)
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.MP_CRON_BEARER }}" \
            'https://pase-yndx.vercel.app/api/mp-update-pending-releases'

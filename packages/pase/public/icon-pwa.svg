<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <!-- Icono PWA de PASE — Sol de Mayo dorado sobre fondo navy PASE.
       512×512 con safe zone ~80% para "maskable" (Android puede recortar
       según la forma del launcher: círculo, squircle, cuadrado redondeado).
       El sol queda dentro del 60% central para asegurar visibilidad. -->

  <!-- Background celeste PASE (#75AADB, mismo del logo del sidebar y
       brand). Llena hasta los bordes para que en modo maskable el OS
       pueda recortar como quiera sin dejar bordes blancos. -->
  <rect width="512" height="512" fill="#75AADB"/>

  <!-- Sol centrado en (256, 256), escalado para ocupar el 60% del canvas
       (radio efectivo ~150px sobre 256 disponibles a cada lado). -->
  <g transform="translate(256 256)">
    <!-- 8 rayos largos (N, S, E, O + 4 diagonales) -->
    <g stroke="#F5C518" stroke-width="20" stroke-linecap="round">
      <line x1="0" y1="-160" x2="0" y2="-100"/>
      <line x1="0" y1="100" x2="0" y2="160"/>
      <line x1="-160" y1="0" x2="-100" y2="0"/>
      <line x1="100" y1="0" x2="160" y2="0"/>
      <line x1="-113" y1="-113" x2="-71" y2="-71"/>
      <line x1="71" y1="71" x2="113" y2="113"/>
      <line x1="-113" y1="113" x2="-71" y2="71"/>
      <line x1="71" y1="-71" x2="113" y2="-113"/>
    </g>

    <!-- 8 rayos cortos intermedios (a 22.5° entre cada par de largos) -->
    <g stroke="#F5C518" stroke-width="13" stroke-linecap="round">
      <line x1="-65" y1="-157" x2="-46" y2="-110"/>
      <line x1="65" y1="-157" x2="46" y2="-110"/>
      <line x1="-157" y1="-65" x2="-110" y2="-46"/>
      <line x1="-157" y1="65" x2="-110" y2="46"/>
      <line x1="110" y1="-46" x2="157" y2="-65"/>
      <line x1="110" y1="46" x2="157" y2="65"/>
      <line x1="-46" y1="110" x2="-65" y2="157"/>
      <line x1="46" y1="110" x2="65" y2="157"/>
    </g>

    <!-- Cara central (círculo dorado lleno) -->
    <circle cx="0" cy="0" r="78" fill="#F5C518"/>

    <!-- Detalles de la cara: ojos + boca en navy -->
    <circle cx="-25" cy="-12" r="6" fill="#0E1726"/>
    <circle cx="25" cy="-12" r="6" fill="#0E1726"/>
    <path d="M -28 22 Q 0 42 28 22" stroke="#0E1726" stroke-width="6" stroke-linecap="round" fill="none"/>
  </g>
</svg>
